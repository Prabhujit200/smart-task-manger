<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        max-width: 1050px;
        margin: 40px auto;
        padding: 20px;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #222;
      }

      h1 {
        text-align: center;
        color: white;
        font-size: 42px;
        margin-bottom: 25px;
      }

      .top-bar,
      .form-box,
      .filter-box,
      .task,
      .card {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        padding: 20px;
        margin-bottom: 20px;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
      }

      button {
        padding: 10px 15px;
        border-radius: 10px;
        border: none;
        color: white;
        cursor: pointer;
        margin-right: 8px;
        margin-top: 8px;
      }

      .save-btn {
        background: green;
      }
      .logout-btn,
      .delete-btn {
        background: red;
      }
      .edit-btn {
        background: blue;
      }
      .toggle-btn {
        background: purple;
      }

      .task {
        margin-top: 10px;
      }

      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        margin-right: 8px;
      }

      .priority-high {
        background: #e53935;
      }
      .priority-medium {
        background: #fb8c00;
      }
      .priority-low {
        background: #43a047;
      }
      .status-pending {
        background: #757575;
      }
      .status-completed {
        background: #2e7d32;
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <h3 id="welcomeText"></h3>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Smart Task Manager</h1>

    <div class="dashboard">
      <div class="card">
        <h2 id="totalCount">0</h2>
        <p>Total Tasks</p>
      </div>
      <div class="card">
        <h2 id="pendingCount">0</h2>
        <p>Pending Tasks</p>
      </div>
      <div class="card">
        <h2 id="completedCount">0</h2>
        <p>Completed Tasks</p>
      </div>
    </div>

    <div class="form-box">
      <input type="hidden" id="taskId" />

      <input type="text" id="title" placeholder="Task Title" />
      <input type="text" id="description" placeholder="Task Description" />
      <input type="date" id="due_date" />

      <select id="priority">
        <option value="">Select Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>

      <select id="status">
        <option value="">Select Status</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>

      <button class="save-btn" onclick="saveTask()">Save Task</button>
    </div>

    <div class="filter-box">
      <input
        type="text"
        id="searchTitle"
        placeholder="Search by title..."
        oninput="fetchTasks()"
      />

      <select id="filterStatus" onchange="fetchTasks()">
        <option value="All">All</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>
    </div>

    <div id="taskList"></div>

    <div class="form-box">
      <canvas id="taskChart" height="100"></canvas>
    </div>

    <script>
      const apiBase = "https://smart-task-manger-o4ki.onrender.com";
      const loggedInUser = localStorage.getItem("loggedInUser");

      if (!loggedInUser) {
        alert("Login first");
        window.location.href = "auth.html";
      }

      document.getElementById("welcomeText").innerText =
        "Welcome " + loggedInUser;

      function logout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "auth.html";
      }

      function getPriorityClass(priority) {
        if (priority === "High") return "priority-high";
        if (priority === "Medium") return "priority-medium";
        return "priority-low";
      }

      function getStatusClass(status) {
        if (status === "Completed") return "status-completed";
        return "status-pending";
      }

      function updateDashboard(tasks) {
        document.getElementById("totalCount").textContent = tasks.length;
        document.getElementById("pendingCount").textContent = tasks.filter(
          (t) => t.status === "Pending",
        ).length;
        document.getElementById("completedCount").textContent = tasks.filter(
          (t) => t.status === "Completed",
        ).length;
      }

      let chart;

      function renderChart(tasks) {
        const pending = tasks.filter((t) => t.status === "Pending").length;
        const completed = tasks.filter((t) => t.status === "Completed").length;

        if (chart) chart.destroy();

        const ctx = document.getElementById("taskChart").getContext("2d");

        chart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["Pending", "Completed"],
            datasets: [
              {
                data: [pending, completed],
              },
            ],
          },
        });
      }

      async function fetchTasks() {
        const res = await fetch(`${apiBase}/tasks/${loggedInUser}`);
        let tasks = await res.json();

        updateDashboard(tasks);
        renderChart(tasks);

        const filter = document.getElementById("filterStatus").value;
        const searchText = document
          .getElementById("searchTitle")
          .value.toLowerCase();

        if (filter !== "All") {
          tasks = tasks.filter((task) => task.status === filter);
        }

        if (searchText) {
          tasks = tasks.filter((task) =>
            task.title.toLowerCase().includes(searchText),
          );
        }

        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task) => {
          const div = document.createElement("div");
          div.className = "task";

          const toggleText =
            task.status === "Completed" ? "Mark Pending" : "Mark Complete";

          div.innerHTML = `
          <h3>${task.title}</h3>
          <p>${task.description}</p>
          <p><b>Due:</b> ${task.due_date}</p>
          <p>
            <span class="badge ${getPriorityClass(task.priority)}">${task.priority}</span>
            <span class="badge ${getStatusClass(task.status)}">${task.status}</span>
          </p>

          <button class="edit-btn" onclick="editTask(${task.id}, '${task.title}', '${task.description}', '${task.due_date}', '${task.priority}', '${task.status}')">Edit</button>

          <button class="toggle-btn" onclick="toggleStatus(${task.id}, '${task.title}', '${task.description}', '${task.due_date}', '${task.priority}', '${task.status}')">${toggleText}</button>

          <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;

          list.appendChild(div);
        });
      }

      async function saveTask() {
        const id = document.getElementById("taskId").value;

        const data = {
          title: document.getElementById("title").value,
          description: document.getElementById("description").value,
          due_date: document.getElementById("due_date").value,
          priority: document.getElementById("priority").value,
          status: document.getElementById("status").value,
          username: loggedInUser,
        };

        if (
          !data.title ||
          !data.description ||
          !data.due_date ||
          !data.priority ||
          !data.status
        ) {
          alert("Fill all fields");
          return;
        }

        if (id) {
          await fetch(`${apiBase}/tasks/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
        } else {
          await fetch(`${apiBase}/tasks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
        }

        clearForm();
        fetchTasks();
      }

      function editTask(id, title, description, due_date, priority, status) {
        document.getElementById("taskId").value = id;
        document.getElementById("title").value = title;
        document.getElementById("description").value = description;
        document.getElementById("due_date").value = due_date;
        document.getElementById("priority").value = priority;
        document.getElementById("status").value = status;
      }

      async function toggleStatus(
        id,
        title,
        description,
        due_date,
        priority,
        status,
      ) {
        const newStatus = status === "Completed" ? "Pending" : "Completed";

        const updatedTask = {
          title: title,
          description: description,
          due_date: due_date,
          priority: priority,
          status: newStatus,
          username: loggedInUser,
        };

        await fetch(`${apiBase}/tasks/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updatedTask),
        });

        fetchTasks();
      }

      async function deleteTask(id) {
        await fetch(`${apiBase}/tasks/${id}`, {
          method: "DELETE",
        });

        fetchTasks();
      }

      function clearForm() {
        document.getElementById("taskId").value = "";
        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("due_date").value = "";
        document.getElementById("priority").value = "";
        document.getElementById("status").value = "";
      }

      fetchTasks();
    </script>
  </body>
</html>
