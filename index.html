<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        max-width: 1050px;
        margin: 40px auto;
        padding: 20px;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #222;
      }

      h1 {
        text-align: center;
        color: white;
        font-size: 42px;
        margin-bottom: 25px;
      }

      .top-bar,
      .form-box,
      .filter-box,
      .task,
      .card {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        padding: 20px;
        margin-bottom: 20px;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
      }

      button {
        padding: 10px 15px;
        border-radius: 10px;
        border: none;
        color: white;
        cursor: pointer;
      }

      .save-btn {
        background: green;
      }
      .logout-btn,
      .delete-btn {
        background: red;
      }
      .edit-btn {
        background: blue;
      }
      .toggle-btn {
        background: purple;
      }

      .task {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <h3 id="welcomeText"></h3>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Smart Task Manager</h1>

    <div class="dashboard">
      <div class="card">
        <h2 id="totalCount">0</h2>
        <p>Total Tasks</p>
      </div>
      <div class="card">
        <h2 id="pendingCount">0</h2>
        <p>Pending Tasks</p>
      </div>
      <div class="card">
        <h2 id="completedCount">0</h2>
        <p>Completed Tasks</p>
      </div>
    </div>

    <div class="form-box">
      <input type="hidden" id="taskId" />

      <input type="text" id="title" placeholder="Task Title" />
      <input type="text" id="description" placeholder="Task Description" />
      <input type="date" id="due_date" />

      <select id="priority">
        <option value="">Select Priority</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <select id="status">
        <option value="">Select Status</option>
        <option>Pending</option>
        <option>Completed</option>
      </select>

      <button class="save-btn" onclick="saveTask()">Save Task</button>
    </div>

    <div class="filter-box">
      <input
        type="text"
        id="searchTitle"
        placeholder="Search..."
        oninput="fetchTasks()"
      />

      <select id="filterStatus" onchange="fetchTasks()">
        <option value="All">All</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>
    </div>

    <div id="taskList"></div>

    <!-- 🔥 CHART ADDED HERE -->
    <div class="form-box">
      <canvas id="taskChart" height="100"></canvas>
    </div>

    <script>
      const apiBase = "https://smart-task-manger-o4ki.onrender.com";
      const loggedInUser = localStorage.getItem("loggedInUser");

      if (!loggedInUser) {
        alert("Login first");
        window.location.href = "auth.html";
      }

      document.getElementById("welcomeText").innerText =
        "Welcome " + loggedInUser;

      function logout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "auth.html";
      }

      function updateDashboard(tasks) {
        document.getElementById("totalCount").textContent = tasks.length;
        document.getElementById("pendingCount").textContent = tasks.filter(
          (t) => t.status === "Pending",
        ).length;
        document.getElementById("completedCount").textContent = tasks.filter(
          (t) => t.status === "Completed",
        ).length;
      }

      let chart;

      function renderChart(tasks) {
        const pending = tasks.filter((t) => t.status === "Pending").length;
        const completed = tasks.filter((t) => t.status === "Completed").length;

        if (chart) chart.destroy();

        const ctx = document.getElementById("taskChart").getContext("2d");

        chart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["Pending", "Completed"],
            datasets: [
              {
                data: [pending, completed],
              },
            ],
          },
        });
      }

      async function fetchTasks() {
        const res = await fetch(`${apiBase}/tasks/${loggedInUser}`);
        let tasks = await res.json();

        updateDashboard(tasks);
        renderChart(tasks);

        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task) => {
          const div = document.createElement("div");
          div.className = "task";

          div.innerHTML = `
            <h3>${task.title}</h3>
            <p>${task.description}</p>
            <p>${task.status}</p>

            <button onclick="deleteTask(${task.id})">Delete</button>
        `;

          list.appendChild(div);
        });
      }

      async function saveTask() {
        const data = {
          title: document.getElementById("title").value,
          description: document.getElementById("description").value,
          due_date: document.getElementById("due_date").value,
          priority: document.getElementById("priority").value,
          status: document.getElementById("status").value,
          username: loggedInUser,
        };

        await fetch(`${apiBase}/tasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        fetchTasks();
      }

      async function deleteTask(id) {
        await fetch(`${apiBase}/tasks/${id}`, { method: "DELETE" });
        fetchTasks();
      }

      fetchTasks();
    </script>
  </body>
</html>
