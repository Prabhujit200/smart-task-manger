<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager - Login</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        animation: float 6s ease-in-out infinite;
      }

      .circle.one {
        width: 180px;
        height: 180px;
        top: 8%;
        left: 10%;
      }

      .circle.two {
        width: 260px;
        height: 260px;
        bottom: 5%;
        right: 8%;
        animation-delay: 1.5s;
      }

      .circle.three {
        width: 100px;
        height: 100px;
        bottom: 18%;
        left: 20%;
        animation-delay: 3s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-25px);
        }
      }

      .auth-card {
        position: relative;
        width: 420px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        transform-style: preserve-3d;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        z-index: 10;
      }

      .auth-card:hover {
        transform: translateY(-8px) rotateX(3deg) rotateY(-3deg);
        box-shadow: 0 35px 80px rgba(0, 0, 0, 0.45);
      }

      h1 {
        text-align: center;
        margin: 0;
        font-size: 34px;
        color: #3b2a7a;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin: 10px 0 30px;
        font-size: 15px;
      }

      .input-group {
        margin-bottom: 18px;
      }

      label {
        font-weight: 600;
        color: #444;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        font-size: 16px;
        border: none;
        border-radius: 14px;
        background: #f1f3f8;
        outline: none;
        box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      input:focus {
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.35);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 14px;
        font-size: 16px;
        border: none;
        border-radius: 14px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.35);
      }

      .signup-btn {
        background: linear-gradient(135deg, #00b09b, #96c93d);
      }

      .login-btn {
        background: linear-gradient(135deg, #2193b0, #6dd5ed);
      }

      #message {
        margin-top: 20px;
        text-align: center;
        font-weight: 700;
        color: #3b2a7a;
        min-height: 24px;
      }

      .footer-text {
        margin-top: 25px;
        text-align: center;
        font-size: 13px;
        color: #777;
      }

      @media (max-width: 500px) {
        .auth-card {
          width: 100%;
          padding: 25px;
        }

        .btn-row {
          flex-direction: column;
        }

        h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="circle one"></div>
    <div class="circle two"></div>
    <div class="circle three"></div>

    <div class="auth-card">
      <h1>Smart Task Manager</h1>
      <p class="subtitle">Login or create an account to manage your tasks</p>

      <div class="input-group">
        <label>Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter username"
          autocomplete="username"
        />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />
      </div>

      <div class="btn-row">
        <button class="signup-btn" onclick="signup()">Sign Up</button>
        <button class="login-btn" onclick="login()">Login</button>
      </div>

      <p id="message"></p>

      <p class="footer-text">
        Full-stack project using FastAPI, SQLite, and JavaScript
      </p>
    </div>

    <script>
      const apiBase = "https://smart-task-manger-o4ki.onrender.com";

      async function signup() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (!username || !password) {
          document.getElementById("message").innerText =
            "Please fill all fields";
          return;
        }

        const response = await fetch(`${apiBase}/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            username: username,
            password: password,
          }),
        });

        const result = await response.json();
        document.getElementById("message").innerText =
          result.message || result.error;
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (!username || !password) {
          document.getElementById("message").innerText =
            "Please fill all fields";
          return;
        }

        const response = await fetch(`${apiBase}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            username: username,
            password: password,
          }),
        });

        const result = await response.json();

        if (result.message) {
          localStorage.setItem("loggedInUser", username);
          window.location.href = "index.html";
        } else {
          document.getElementById("message").innerText = result.error;
        }
      }
    </script>
  </body>
</html>
